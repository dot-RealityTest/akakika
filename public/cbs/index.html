<!DOCTYPE html>

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0a0a;color:#eee;font-family:'IBM Plex Mono','Fira Code',monospace;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
    .container{max-width:600px;text-align:center}
    h1{font-family:'Arial Black','Impact',sans-serif;font-size:clamp(2rem,8vw,4rem);letter-spacing:-0.03em;margin-bottom:0.5rem;color:#a5b4fc}

    .features span{font-size:0.85rem;color:#999;display:flex;align-items:center;gap:0.5rem}

  <div class="container">
    <p class="tag">macos · free · menu bar</p>

    <div class="features">
      <span>sanitize --clipboard</span>
      <span>tracking params stripped</span>
      <span>rich text → plain text</span>
      <span>runs silently in menu bar</span>
      <span>free. always.</span>
