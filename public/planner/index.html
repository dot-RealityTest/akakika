<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Jez V — מתכנן אינסטגרם</title>
    <style>
#planner-gate{
  position:fixed;inset:0;z-index:99999;background:#FAFAF9;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:1rem;font-family:"Assistant","Heebo",system-ui,sans-serif;
}
#planner-gate input{
  padding:.6rem 1.2rem;font-size:1.1rem;border:2px solid #D9BBD3;
  border-radius:8px;outline:none;text-align:center;width:200px;
  font-family:inherit;direction:rtl;
}
#planner-gate input:focus{border-color:#B3ADD9}
#planner-gate button{
  padding:.5rem 1.5rem;font-size:1rem;background:#B3ADD9;color:#fff;
  border:none;border-radius:8px;cursor:pointer;font-family:inherit;
}
#planner-gate button:hover{background:#AAA3CD}
#planner-gate .err{color:#C69FA8;font-size:.9rem;min-height:1.2em}
body.planner-gated>*:not(#planner-gate){display:none}
    </style>
    <style>
      @font-face {
        font-family: 'Assistant';
        src: url('https://d2xsxph8kpxj0f.cloudfront.net/310519663256363840/DkiTZrSVh9AsPZzRKcKRd2/Assistant-VariableFont_wght_b86e2866.ttf') format('truetype');
        font-weight: 200 800;
        font-display: swap;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <script type="module" crossorigin src="/planner/assets/index-DnBjqArN.js"></script>
    <link rel="stylesheet" crossorigin href="/planner/assets/index-B51kO7YA.css">
  </head>
  <body>
    <div id="planner-gate">
      <input type="password" id="planner-pw" placeholder="סיסמה" autofocus>
      <button id="planner-btn">כניסה</button>
      <div class="err" id="planner-err"></div>
    </div>
    <div id="root"></div>
  </body>
  <script>
(function(){
  document.body.classList.add('planner-gated');
  var g=document.getElementById('planner-gate'),pw=document.getElementById('planner-pw'),
      btn=document.getElementById('planner-btn'),err=document.getElementById('planner-err');
  function unlock(){
    if(pw.value==='jezv2026'){
      document.body.classList.remove('planner-gated');
      g.remove();
      document.cookie='pl=1;path=/planner;max-age=86400';
    }else{err.textContent='סיסמה שגויה'}
  }
  btn.onclick=unlock;
  pw.onkeydown=function(e){if(e.key==='Enter')unlock()};
  if(document.cookie.indexOf('pl=1')>-1){
    document.body.classList.remove('planner-gated');
    g.remove();
  }
})();
  </script>
</html>
